# /etc/nginx/sites-available/article-writer
# Replace YOUR_EC2_IP_OR_DOMAIN with your EC2 public IP or domain
server {
    listen 80 default_server;
    listen [::]:80 default_server;

    server_name _;

    # Increase request size for article generation
    client_max_body_size 10M;

    # Serve frontend (Vite build output)
    root /home/ubuntu/Article_Writer/frontend/dist;
    index index.html;

    # SPA fallback - all non-asset routes to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API requests to Node backend
    location /api/ {
        proxy_pass http://127.0.0.1:5001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_cache_bypass $http_upgrade;

        # Long timeout for AI generation (5 minutes)
        proxy_read_timeout 300s;
        proxy_connect_timeout 75s;
        proxy_send_timeout 300s;
    }

    # Cache static assets aggressively
    location ~* \.(?:css|js|jpg|jpeg|gif|png|ico|svg|woff|woff2)$ {
        expires 30d;
        add_header Cache-Control "public, no-transform";
        try_files $uri =404;
    }
}
